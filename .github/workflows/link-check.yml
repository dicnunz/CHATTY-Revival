name: Link Check

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "21 14 * * 1"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Static site link check
        run: python3 tools/link_check.py
